# Contract Sections Configuration
# Single source of truth for validation rules.
# Loaded by plan.py at import time.

[design]
required_sections = ["Summary", "Approach", "Architecture Decisions", "BDD/TDD Strategy", "Verification"]
optional_sections = ["Requirements & Goals", "Architecture Overview", "Data Models", "Interface Contracts", "Implementation Plan"]

[tasks]
required_fields = ["Context:", "Verification:", "Status:", "Scenario Coverage:"]

[build_blocked]
required_fields = ["Reason", "Requested Change", "Impact"]

[dcr]
required_fields = ["Reason", "Requested Change", "Impact"]
