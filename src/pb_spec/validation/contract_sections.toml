# Contract Sections Configuration
# Single source of truth for validation rules.
# Loaded by plan.py at import time.
#
# Source of authority: docs/contract.md §6.2 and §7.2

[full_mode]
required_sections = [
    "Executive Summary",
    "Requirements & Goals",
    "Architecture Overview",
    "Architecture Decisions",
    "Data Models",
    "Interface Contracts",
    "Detailed Design",
    "Verification & Testing Strategy",
    "Implementation Plan",
]

[lightweight_mode]
required_sections = [
    "Summary",
    "Approach",
    "Architecture Decisions",
    "BDD/TDD Strategy",
    "Code Simplification Constraints",
    "BDD Scenario Inventory",
    "Existing Components to Reuse",
    "Verification",
]

[tasks]
required_fields = [
    "Context:",
    "Verification:",
    "Scenario Coverage:",
    "Loop Type:",
    "Behavioral Contract:",
    "Simplification Focus:",
    "Status:",
    "BDD Verification:",
    "Advanced Test Verification:",
    "Runtime Verification:",
]

na_reason_fields = [
    "Scenario Coverage:",
    "BDD Verification:",
    "Advanced Test Verification:",
    "Runtime Verification:",
]
